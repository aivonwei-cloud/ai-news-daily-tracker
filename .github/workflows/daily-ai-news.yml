name: 每日AI行业动态跟踪

on:
  workflow_dispatch:  # 支持手动触发
  repository_dispatch:  # cron-job.org 精确触发（北京时间8:00）
    types: [daily-news]

jobs:
  ai-news-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # 允许提交 today_articles.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 抓取并推送AI日报
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ai_news_daily.py

      - name: 提交文章索引到仓库
        run: |
          git config user.name "AI News Bot"
          git config user.email "ai-news-bot@example.com"
          git add today_articles.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update today_articles.json [skip ci]"
            git push
          fi
